<!DOCTYPE html>
<html lang="en-IE">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pocketly — Your money, watched</title>
<meta name="author" content="Pocketly" />
<meta name="description" content="Track money made vs spent for personal and business in euro. Honest weekly limits, overspend warnings, forecasts and a shareable critical report." />
<meta name="theme-color" content="#1B3A2B" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Pocketly — Your money, watched" />
<meta property="og:description" content="Honest spending tracking with weekly limits, forecasts and a shareable report." />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Pocketly — Your money, watched" />
<meta name="twitter:description" content="Honest spending tracking with weekly limits, forecasts and a shareable report." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F5EF; --surface:#FFFFFF; --surface-2:#FCFBF7;
    --green:#1B3A2B; --green-2:#245C3D; --green-soft:#E7EFE8;
    --ink:#1A1A17; --muted:#6B6B63; --hair:#E5E1D6;
    --good:#2E7D4F; --warn:#B5791F; --warn-soft:#FBF1DD; --danger:#A23B2D; --danger-soft:#F7E6E2;
    --r:14px; --shadow:0 1px 0 var(--hair);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45;padding-bottom:84px}
  h1,h2,h3,.display{font-family:Archivo,sans-serif;letter-spacing:-0.01em;margin:0}
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:16px}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px}
  /* Header */
  header{background:var(--green);color:#fff;padding:18px 0 16px}
  header .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{font-family:Archivo;font-weight:800;font-size:20px;letter-spacing:-0.02em;color:#fff}
  .brand span{color:#9FC9AC}
  .histbtn{width:30px;height:30px;border-radius:999px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.08);color:#fff;font-size:18px;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0}
  .histbtn:disabled{opacity:.3}
  .updated{font-size:12px;color:#BFD6C6;text-align:right}
  .updated.stale{color:#F2C99A;font-weight:600}
  /* View toggle */
  .scope-bar{position:sticky;top:0;z-index:30;background:var(--bg);padding:12px 0 6px;border-bottom:1px solid var(--hair)}
  .seg{display:flex;background:var(--surface-2);border:1px solid var(--hair);border-radius:999px;padding:4px;gap:4px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-weight:600;font-size:14px;padding:9px 0;border-radius:999px}
  .seg button.on{background:var(--green);color:#fff}
  section{margin:16px 0}
  .card{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:16px}
  .card + .card{margin-top:12px}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;font-family:"IBM Plex Mono",monospace}
  .row{display:flex;gap:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  @media(max-width:520px){.grid3{grid-template-columns:1fr 1fr}}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600}
  .stat .v{font-family:"IBM Plex Mono";font-weight:600;font-size:24px;margin-top:4px}
  .stat .sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:"IBM Plex Mono"}
  .v.good{color:var(--good)} .v.warn{color:var(--warn)} .v.bad{color:var(--danger)}
  /* Limit meter */
  .meter-head{display:flex;justify-content:space-between;align-items:baseline}
  .meter-head .lbl{font-family:Archivo;font-weight:700;font-size:16px}
  .meter-head .amt{font-family:"IBM Plex Mono";font-weight:600;font-size:15px}
  .meter{height:12px;border-radius:999px;background:var(--green-soft);overflow:hidden;margin-top:10px;border:1px solid var(--hair)}
  .meter > i{display:block;height:100%;border-radius:999px;background:var(--good);transition:width .4s}
  .meter.amber > i{background:var(--warn)} .meter.red > i{background:var(--danger)}
  .meter-note{font-size:12.5px;margin-top:8px;color:var(--muted)}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;font-family:"IBM Plex Mono"}
  .pill.good{background:var(--green-soft);color:var(--green-2)}
  .pill.amber{background:var(--warn-soft);color:var(--warn)}
  .pill.red{background:var(--danger-soft);color:var(--danger)}
  .banner{display:flex;gap:10px;align-items:flex-start;border-radius:12px;padding:12px 14px;font-size:13.5px}
  .banner.warn{background:var(--warn-soft);color:#7a5212;border:1px solid #EAD4A6}
  .banner.bad{background:var(--danger-soft);color:#7d281c;border:1px solid #E7C0B8}
  .banner b{font-weight:700}
  .list{display:flex;flex-direction:column}
  .li{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--hair)}
  .li:first-child{border-top:0}
  .li .dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto;background:var(--green-2)}
  .li .main{flex:1;min-width:0}
  .li .t{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li .s{font-size:12px;color:var(--muted)}
  .li .amt{font-family:"IBM Plex Mono";font-weight:600;font-size:14px}
  .li .amt.in{color:var(--good)}
  .tag{font-size:10px;font-weight:700;font-family:"IBM Plex Mono";color:var(--muted);border:1px solid var(--hair);border-radius:6px;padding:2px 6px}
  .section-title{display:flex;justify-content:space-between;align-items:baseline;margin:0 2px 10px}
  .section-title h2{font-size:18px}
  .link{background:none;border:0;color:var(--green-2);font-weight:700;font-size:13px;padding:0}
  /* SVG charts */
  .chart{width:100%}
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:12px}
  .legend span{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--green);background:var(--green);color:#fff;font-weight:700;font-size:15px;padding:13px 16px;border-radius:12px;width:100%}
  .btn.ghost{background:transparent;color:var(--green-2);border-color:var(--hair)}
  .btn.sm{padding:9px 12px;font-size:13px;width:auto}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap}
  .btn-row .btn{flex:1;min-width:130px}
  /* Forms */
  label.f{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 5px}
  .field{width:100%;border:1px solid var(--hair);border-radius:10px;padding:12px;background:var(--surface-2)}
  .field:focus{outline:2px solid var(--green-soft);border-color:var(--green-2)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .full{grid-column:1/-1}
  .seg2{display:flex;border:1px solid var(--hair);border-radius:10px;overflow:hidden}
  .seg2 button{flex:1;border:0;background:var(--surface-2);color:var(--muted);font-weight:600;padding:11px 0;font-size:13px}
  .seg2 button.on{background:var(--green-2);color:#fff}
  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(26,26,23,.5);display:none;align-items:flex-end;z-index:100}
  .modal.show{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:760px;margin:0 auto;border-radius:18px 18px 0 0;max-height:92vh;overflow:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
  .sheet h2{font-size:19px;margin-bottom:14px}
  .sheet .close{float:right;border:0;background:var(--surface-2);width:34px;height:34px;border-radius:999px;font-size:18px;color:var(--muted)}
  @media(min-width:760px){.modal{align-items:center}.sheet{border-radius:18px}}
  /* Bottom nav */
  nav.tab{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--surface);border-top:1px solid var(--hair);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
  nav.tab button{flex:1;border:0;background:none;color:var(--muted);font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav.tab button .ic{font-size:18px}
  nav.tab button.on{color:var(--green-2)}
  .fab{position:fixed;right:16px;bottom:78px;z-index:41;width:56px;height:56px;border-radius:18px;background:var(--green);color:#fff;border:0;font-size:26px;box-shadow:0 6px 20px rgba(27,58,43,.35)}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:18px 8px}
  .receipt-thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;border:1px solid var(--hair)}
  .hide{display:none!important}
  body.viewonly #fabAdd{display:none!important}
  .muted{color:var(--muted)}
  .right{text-align:right}
  .micro{font-size:11px;color:var(--muted)}
  .goalbar{height:8px;border-radius:999px;background:var(--green-soft);overflow:hidden;margin-top:8px}
  .goalbar > i{display:block;height:100%;background:var(--green-2)}
  .ask{display:flex;gap:8px;margin-top:10px}
  .ask .field{flex:1}
  /* Report (also print) */
  #reportDoc{background:#fff}
  .rep-head{border-bottom:3px solid var(--green);padding-bottom:14px;margin-bottom:18px}
  .rep-head .ttl{font-family:Archivo;font-weight:800;font-size:24px;color:var(--green)}
  .rep-head .meta{font-size:12px;color:var(--muted);font-family:"IBM Plex Mono";margin-top:4px}
  .verdict{border-left:4px solid var(--green-2);padding:12px 14px;background:var(--surface-2);border-radius:0 10px 10px 0;margin:14px 0;font-size:14.5px}
  .verdict.warn{border-color:var(--warn);background:var(--warn-soft)}
  .verdict.bad{border-color:var(--danger);background:var(--danger-soft)}
  .rep-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
  .rep-stat{border:1px solid var(--hair);border-radius:10px;padding:12px}
  .rep-stat .k{font-size:11px;color:var(--muted);font-weight:600}
  .rep-stat .v{font-family:"IBM Plex Mono";font-weight:600;font-size:20px;margin-top:3px}
  .findings{list-style:none;padding:0;margin:8px 0}
  .findings li{display:flex;gap:10px;padding:9px 0;border-top:1px dashed var(--hair);font-size:14px}
  .findings li:first-child{border-top:0}
  .findings .mk{font-weight:800;font-family:"IBM Plex Mono"}
  .mk.g{color:var(--good)} .mk.w{color:var(--warn)} .mk.b{color:var(--danger)}
  .comments .cmt{border:1px solid var(--hair);border-radius:10px;padding:10px 12px;margin-top:8px}
  .comments .cmt .who{font-weight:700;font-size:12px}
  .comments .cmt .when{font-size:11px;color:var(--muted)}
  .comments .reply{margin:8px 0 0 16px;border-left:2px solid var(--green-soft);padding-left:10px}
  @media print{
    body{background:#fff;padding:0}
    header,nav.tab,.fab,.scope-bar,.no-print{display:none!important}
    .wrap{max-width:100%;padding:0}
    .card{border:none;padding:0}
    #reportDoc{padding:0}
    section{margin:0}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="histbtn" id="navBack" aria-label="Back">‹</button>
      <button class="histbtn" id="navFwd" aria-label="Forward">›</button>
      <div class="brand">Pocket<span>ly</span></div>
    </div>
    <div class="updated" id="updatedTag">No data yet</div>
  </div>
</header>
<div class="scope-bar">
  <div class="wrap">
    <div class="seg" id="scopeSeg">
      <button data-scope="personal" class="on">Personal</button>
      <button data-scope="business">Business</button>
      <button data-scope="combined">Combined</button>
    </div>
  </div>
</div>
<main class="wrap">
  <!-- DASHBOARD -->
  <div id="view-home"></div>
  <!-- REPORT -->
  <div id="view-report" class="hide"></div>
  <!-- GOALS / SETTINGS -->
  <div id="view-plan" class="hide"></div>
</main>
<button class="fab no-print" id="fabAdd" aria-label="Add money in or out">+</button>
<nav class="tab no-print">
  <button data-view="home" class="on"><span class="ic">▦</span>Home</button>
  <button data-view="report"><span class="ic">▤</span>Report</button>
  <button data-view="plan"><span class="ic">◎</span>Plan</button>
  <button id="navUpload"><span class="ic">⇪</span>Upload</button>
</nav>
<!-- ADD MODAL -->
<div class="modal" id="addModal">
  <div class="sheet">
    <button class="close" onclick="closeModal('addModal')">×</button>
    <h2 id="addTitle">Add money</h2>
    <button class="btn ghost" style="margin-bottom:14px" onclick="scanReceipt()">📷 Scan a receipt</button>
    <div class="seg2" style="margin-bottom:14px" id="typeSeg">
      <button data-type="spend" class="on">Money out</button>
      <button data-type="income">Money in</button>
    </div>
    <div class="form-grid">
      <div>
        <label class="f">Amount (€)</label>
        <input class="field mono" id="aAmount" type="number" inputmode="decimal" step="0.01" placeholder="0.00" />
      </div>
      <div>
        <label class="f">Date</label>
        <input class="field" id="aDate" type="date" />
      </div>
      <div class="full">
        <label class="f">Who / what (merchant)</label>
        <input class="field" id="aMerchant" placeholder="e.g. Tesco, Circle K, Netflix" />
      </div>
      <div>
        <label class="f">Category</label>
        <select class="field" id="aCategory"></select>
      </div>
      <div>
        <label class="f">Paid by</label>
        <div class="seg2" id="methodSeg">
          <button data-method="card" class="on">Card</button>
          <button data-method="cash">Cash</button>
        </div>
      </div>
      <div>
        <label class="f">For</label>
        <div class="seg2" id="addScopeSeg">
          <button data-ascope="personal" class="on">Personal</button>
          <button data-ascope="business">Business</button>
        </div>
      </div>
      <div>
        <label class="f">Receipt? (optional)</label>
        <input class="field" id="aReceipt" type="file" accept="image/*" capture="environment" />
      </div>
      <div class="full">
        <label class="f">Note (optional)</label>
        <input class="field" id="aNote" placeholder="Anything to remember" />
      </div>
    </div>
    <div style="margin-top:16px" class="btn-row">
      <button class="btn ghost" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn" onclick="saveTxn()">Save entry</button>
    </div>
    <p class="micro" style="margin-top:10px">Tip: change the category and Pocketly will offer to remember it for this merchant next time.</p>
  </div>
</div>
<!-- GOAL MODAL -->
<div class="modal" id="goalModal">
  <div class="sheet">
    <button class="close" onclick="closeModal('goalModal')">×</button>
    <h2>New savings goal</h2>
    <div class="form-grid">
      <div class="full"><label class="f">Goal name</label><input class="field" id="gName" placeholder="e.g. Holiday fund" /></div>
      <div><label class="f">Target (€)</label><input class="field mono" id="gTarget" type="number" inputmode="decimal" placeholder="500" /></div>
      <div><label class="f">By date</label><input class="field" id="gBy" type="date" /></div>
      <div class="full">
        <label class="f">For</label>
        <div class="seg2" id="goalScopeSeg">
          <button data-gscope="personal" class="on">Personal</button>
          <button data-gscope="business">Business</button>
        </div>
      </div>
    </div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn ghost" onclick="closeModal('goalModal')">Cancel</button>
      <button class="btn" onclick="saveGoal()">Add goal</button>
    </div>
  </div>
</div>
<!-- BILL MODAL -->
<div class="modal" id="billModal">
  <div class="sheet">
    <button class="close" onclick="closeModal('billModal')">×</button>
    <h2>Upcoming bill</h2>
    <div class="form-grid">
      <div class="full"><label class="f">Name</label><input class="field" id="bName" placeholder="e.g. Insurance, VAT, rent" /></div>
      <div><label class="f">Amount (€)</label><input class="field mono" id="bAmount" type="number" inputmode="decimal" placeholder="0.00" /></div>
      <div><label class="f">Due date</label><input class="field" id="bDue" type="date" /></div>
      <div><label class="f">For</label>
        <div class="seg2" id="billScopeSeg">
          <button data-bscope="personal" class="on">Personal</button>
          <button data-bscope="business">Business</button>
        </div>
      </div>
      <div><label class="f">Repeats?</label>
        <select class="field" id="bRepeat"><option value="none">One-off</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select>
      </div>
    </div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn ghost" onclick="closeModal('billModal')">Cancel</button>
      <button class="btn" onclick="saveBill()">Add bill</button>
    </div>
  </div>
</div>
<!-- hidden upload input -->
<input id="fileImport" type="file" accept=".csv,.txt,.xlsx,.xls,image/*,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" multiple class="hide" />
<!-- hidden scan input (camera) -->
<input id="scanInput" type="file" accept="image/*,application/pdf" capture="environment" class="hide" />
<script>
/* ---------- Storage: localStorage with in-memory fallback ---------- */
const Store=(()=>{let mem={},ok=false;try{localStorage.setItem('__t','1');localStorage.removeItem('__t');ok=true;}catch(e){ok=false;}
  return{get:k=>{try{return ok?localStorage.getItem(k):(mem[k]??null);}catch(e){return mem[k]??null;}},
         set:(k,v)=>{try{ok?localStorage.setItem(k,v):mem[k]=v;}catch(e){mem[k]=v;}},
         persistent:ok};})();
const KEY='pocketly_v2';
const BUILD='b24 · 21 Jun 2026';
/* ---------- Cloud sync (Supabase) ---------- */
const SB_URL='https://mumnsjtwvkdnnsyncaxk.supabase.co';
const SB_KEY='sb_publishable_jN8ra4PriSLy2jRGW3xKIQ_F80z1T8u';
const SB_CDN='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
let sb=null,CLOUDKEY=null,VIEWONLY=false,cloudReady=false,_pushT=null;
let LVERSIONS=[];
const ACCOUNT_KEY='pkacct_n0el_7Yq3Wk9rZ2xD8f';
function cloudKeyGet(){return Store.get('pocketly_cloudkey')||ACCOUNT_KEY;}
async function sbInit(){if(sb)return sb;if(typeof window.supabase==='undefined')await loadScript(SB_CDN);sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:false}});return sb;}
function cloudStatus(t){const el=document.getElementById('cloudStatus');if(el)el.textContent=t;}
async function cloudPull(){try{await sbInit();cloudStatus('Syncing…');const r=await sb.from('pocketly_data').select('data,updated,versions').eq('id',CLOUDKEY).maybeSingle();if(r.error){logError('cloud pull: '+r.error.message,'cloud');cloudStatus('Offline');return;}if(r.data&&r.data.data){const cloudT=r.data.updated?new Date(r.data.updated).getTime():0;const localT=(DB.meta&&DB.meta.lastUpdated)?new Date(DB.meta.lastUpdated).getTime():0;if(VIEWONLY||cloudT>=localT){DB=Object.assign(defaults(),r.data.data);if(!VIEWONLY){try{Store.set(KEY,JSON.stringify(DB));}catch(e){}}renderAll();}}if(r.data&&r.data.versions){LVERSIONS=r.data.versions;try{Store.set('pocketly_versions',JSON.stringify(LVERSIONS));}catch(e){}}cloudReady=true;cloudStatus('Synced');lockCheck();}catch(e){logError('cloud pull ex: '+e.message,'cloud');cloudStatus('Offline');}}
function cloudPush(){if(VIEWONLY)return;clearTimeout(_pushT);_pushT=setTimeout(async function(){try{snapshotMaybe();await sbInit();cloudStatus('Saving…');const r=await sb.from('pocketly_data').upsert({id:CLOUDKEY,data:DB,updated:new Date().toISOString(),versions:LVERSIONS});if(r.error){logError('cloud push: '+r.error.message,'cloud');cloudStatus('Offline');}else{cloudReady=true;cloudStatus('Synced');}}catch(e){logError('cloud push ex: '+e.message,'cloud');cloudStatus('Offline');}},800);}
function shareLink(){return location.origin+location.pathname+'?view='+encodeURIComponent(CLOUDKEY||'');}
function copyShare(){const x=shareLink();if(navigator.clipboard)navigator.clipboard.writeText(x).then(function(){toast('Friend link copied');});else toast(x);}
function syncLink(){return location.origin+location.pathname+'?key='+encodeURIComponent(CLOUDKEY||'');}
function copySync(){const x=syncLink();if(navigator.clipboard)navigator.clipboard.writeText(x).then(function(){toast('Sync link copied — open it on your other devices');});else toast(x);}
function adoptSync(){const el=document.getElementById('syncIn');const k=(el&&el.value||'').trim();if(!k)return toast('Paste a sync code first');CLOUDKEY=k.replace(/^.*[?&]key=/,'').replace(/^.*[?&]view=/,'');try{Store.set('pocketly_cloudkey',CLOUDKEY);}catch(e){}cloudPull();toast('Loading that account…');}
function hashStr(s){let h=5381;for(let i=0;i<s.length;i++)h=((h*33)^s.charCodeAt(i))>>>0;return 'h'+h.toString(36);}
function isUnlocked(){try{return sessionStorage.getItem('pocketly_unlocked')==='1';}catch(e){return window.__unlocked===true;}}
function setUnlocked(){try{sessionStorage.setItem('pocketly_unlocked','1');}catch(e){window.__unlocked=true;}}

function ytd(scope=SCOPE){const y=today().getFullYear();const ts=scopeTxns(scope).filter(t=>yearOf(t.date)===y&&countable(t));

/* recurring detection: merchant seen in 2+ distinct months with similar amount */
function recurring(scope=SCOPE){
  const map={};
  scopeTxns(scope).filter(t=>t.type==='spend'&&countable(t)).forEach(t=>{
    const k=(t.merchant||t.category||'?').toLowerCase();
    map[k]=map[k]||{name:t.merchant||t.category,months:new Set(),amts:[],cat:t.category};
    map[k].months.add(new Date(t.date).toISOString().slice(0,7));
    map[k].amts.push(t.amount);
  });
  return Object.values(map).filter(r=>r.months.size>=2).map(r=>{
    const avg=r.amts.reduce((a,b)=>a+b,0)/r.amts.length;
    return{name:r.name,cat:r.cat,monthly:avg,count:r.months.size,annual:avg*12,isSub:r.cat==='Subscriptions'||(avg<60&&r.months.size>=3)};
  }).sort((a,b)=>b.annual-a.annual);
}
function catTotals(scope=SCOPE,from,to){const o={};scopeTxns(scope).filter(t=>t.type==='spend'&&countable(t)&&(!from||inRange(t,from,to))).forEach(t=>{o[t.category]=(o[t.category]||0)+t.amount;});return o;}
function monthly(scope=SCOPE,year=today().getFullYear()){const sp=Array(12).fill(0),inc=Array(12).fill(0);
  scopeTxns(scope).filter(t=>yearOf(t.date)===year&&countable(t)).forEach(t=>{const m=new Date(t.date).getMonth();t.type==='spend'?sp[m]+=t.amount:inc[m]+=t.amount;});return{sp,inc};}
function cashTrend(scope=SCOPE){const now=today();const thisM={c:0,t:0},lastM={c:0,t:0};
  scopeTxns(scope).filter(t=>t.type==='spend'&&countable(t)).forEach(t=>{const d=new Date(t.date);const diff=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
    if(diff===0){thisM.t+=t.amount;if(t.method==='cash')thisM.c+=t.amount;}
    if(diff===1){lastM.t+=t.amount;if(t.method==='cash')lastM.c+=t.amount;}});
  return{thisM,lastM};}

function forecastTo(dateStr,scope=SCOPE){const y=today().getFullYear();const ts=scopeTxns(scope).filter(t=>t.type==='spend'&&countable(t)&&yearOf(t.date)===y);
  const total=ts.reduce((a,t)=>a+t.amount,0);const elapsed=Math.max(1,daysBetween(new Date(y,0,1),today()));const perDay=total/elapsed;
  const days=Math.max(0,daysBetween(today(),dateStr));return{perDay,projected:total+perDay*days,extra:perDay*days,days};}

function donut(data){const entries=Object.entries(data).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]);

  const leg=entries.map(([k,v],i)=>`<span><i style="background:${PAL[i%PAL.length]}"></i>${esc(k)} · ${fmt0(v)}</span>`).join('');
  return`<svg viewBox="0 0 140 140" class="chart" style="max-width:200px;display:block;margin:0 auto"><g>${segs}</g><text x="70" y="66" text-anchor="middle" font-family="IBM Plex Mono" font-size="13" font-weight="600" fill="#1A1A17">${fmt0(total)}</text><text x="70" y="82" text-anchor="middle" font-family="Inter" font-size="8" fill="#6B6B63">spent</text></svg><div class="legend">${leg}</div>`;}
function bars(sp,inc){const M=["J","F","M","A","M","J","J","A","S","O","N","D"];const max=Math.max(1,...sp,...inc);const W=320,H=120,bw=W/12;

    g+=`<rect x="${x+3}" y="${H-ih}" width="${bw/2-3}" height="${ih}" fill="#245C3D" rx="2"/>`;
    g+=`<rect x="${x+bw/2}" y="${H-sh}" width="${bw/2-3}" height="${sh}" fill="#A23B2D" rx="2"/>`;
    g+=`<text x="${x+bw/2}" y="${H+12}" text-anchor="middle" font-size="8" fill="#6B6B63" font-family="IBM Plex Mono">${M[i]}</text>`;}
  return`<svg viewBox="0 0 ${W} ${H+18}" class="chart">${g}</svg><div class="legend"><span><i style="background:#245C3D"></i>Made</span><span><i style="background:#A23B2D"></i>Spent</span></div>`;}

function monthsElapsedYTD(){return Math.max(1,(today()-new Date(today().getFullYear(),0,1))/2629800000);}
function monthlyIncomeAvg(){return ytd().made/monthsElapsedYTD();}
function monthlyExpenseAvg(){return ytd().spent/monthsElapsedYTD();}
function spendByCatRange(d0,d1){const now=today();const from=new Date(now);from.setDate(from.getDate()-d1);const to=new Date(now);to.setDate(to.getDate()-d0);
  const o={};scopeTxns().filter(t=>t.type==='spend'&&countable(t)).forEach(t=>{const d=new Date(t.date);if(d>=from&&d<to)o[t.category]=(o[t.category]||0)+t.amount;});return o;}
function sumObj(o){return Object.values(o).reduce((a,b)=>a+b,0);}
function billsWithin(days){const out=[];const horizon=new Date();horizon.setDate(horizon.getDate()+days);const start=new Date();start.setHours(0,0,0,0);
  DB.bills.filter(b=>SCOPE==='combined'||b.scope===SCOPE).forEach(b=>{let due=new Date(b.due);
    if(b.repeat==='monthly'){while(due<start)due.setMonth(due.getMonth()+1);}
    if(b.repeat==='yearly'){while(due<start)due.setFullYear(due.getFullYear()+1);}
    if(due<=horizon&&due>=start)out.push({...b,due:dISO(due)});});
  return out.sort((a,b)=>new Date(a.due)-new Date(b.due));}
function computeHealth(){
  const y=ytd();const hasData=(y.made>0||y.spent>0);
  if(!hasData)return{total:0,hasData:false,months:0,parts:[['Savings',0,30],['Spending Control',0,20],['Emergency Fund',0,20],['Bills',0,15],['Income Stability',0,15]]};
  const sr=y.made>0?y.left/y.made:0;
  const mExp=monthlyExpenseAvg()||1;const mInc=monthlyIncomeAvg();
  const savings=y.made>0?Math.max(0,Math.min(30,sr>=0.2?30:(sr/0.2)*30)):0;
  const wl=weeklyLimit(),sw=spentThisWeek();
  let spending=0;if(y.spent>0){const r=wl?sw/wl:1;spending=r<=0.8?20:r<=1?16:r<=1.25?9:3;}
  const months=Math.max(0,y.left)/mExp;const emergency=y.made>0?Math.max(0,Math.min(20,(months/6)*20)):0;
  const bills30=billsWithin(30).reduce((a,b)=>a+b.amount,0);
  let billsScore=0;if(mInc>0){const br=bills30/mInc;billsScore=br<=0.5?15:br<=0.8?10:br<=1?5:2;}
  const incArr=monthly().inc.filter(v=>v>0);let income=0;
  if(incArr.length>=2){const m=incArr.reduce((a,b)=>a+b,0)/incArr.length;const sd=Math.sqrt(incArr.reduce((a,b)=>a+(b-m)*(b-m),0)/incArr.length);const cv=m?sd/m:1;income=Math.max(0,Math.min(15,(1-cv)*15));}
  else if(incArr.length===1){income=7;}
  const total=Math.round(savings+spending+emergency+billsScore+income);
  return{total,hasData:true,months,parts:[['Savings',Math.round(savings),30],['Spending Control',Math.round(spending),20],['Emergency Fund',Math.round(emergency),20],['Bills',Math.round(billsScore),15],['Income Stability',Math.round(income),15]]};
}
function incomeRange(d0,d1){const now=today();const from=new Date(now);from.setDate(from.getDate()-d1);const to=new Date(now);to.setDate(to.getDate()-d0);
  return scopeTxns().filter(t=>t.type==='income'&&countable(t)).reduce((a,t)=>{const d=new Date(t.date);return(d>=from&&d<to)?a+t.amount:a;},0);}
function computeAudit(){
  const cur=spendByCatRange(0,7),prev=spendByCatRange(7,14);
  const good=[],warn=[],crit=[];const curTot=sumObj(cur),prevTot=sumObj(prev);
  Object.keys(Object.assign({},cur,prev)).forEach(c=>{const a=cur[c]||0,b=prev[c]||0;if(b>=10){const d=Math.round((a-b)/b*100);if(d>=15)warn.push(c+' up '+d+'%');else if(d<=-10)good.push(c+' down '+Math.abs(d)+'%');}});
  if(prevTot>0&&curTot<prevTot)good.push('Total spending down '+Math.round((prevTot-curTot)/prevTot*100)+'% vs last week');
  const incCur=incomeRange(0,7),incPrev=incomeRange(7,14);
  if(incPrev>0&&incCur-incPrev>0)good.push('Income up '+fmt0(incCur-incPrev)+' vs last week');
  const we=spendingPatterns().weekendAvgPerWeek;if(we>20)warn.push('Weekend spending '+fmt0(we)+' average');
  const wl=weeklyLimit(),sw=spentThisWeek();
  if(wl&&sw>wl){const over=sw-wl;crit.push("You're overspending by "+fmt0(over)+" this week");crit.push('Projected '+fmt0(over*52)+' annual waste');}
  return{good,warn,crit};
}
function computeLeaks(){
  const leaks=[];recurring().filter(r=>r.isSub).forEach(s=>leaks.push([s.name,s.annual]));
  const me=monthsElapsedYTD();const ct=catTotals();
  ['Eating out','Shopping','Entertainment'].forEach(c=>{if(ct[c]){const ann=ct[c]/me*12;if(ann>50)leaks.push([c+' (annualised)',ann]);}});
  leaks.sort((a,b)=>b[1]-a[1]);return{leaks:leaks.slice(0,8),total:leaks.reduce((a,l)=>a+l[1],0)};
}
function computeCashflow(){const bills=billsWithin(30);const tot=bills.reduce((a,b)=>a+b.amount,0);
  const incoming=monthlyIncomeAvg();const buffer=Math.max(0,ytd().left);return{bills,tot,incoming,cover:(incoming+buffer)>=tot};}

const BENCH={'Eating out':8,'Groceries':12,'Subscriptions':4,'Shopping':6,'Fuel':6,'Transport':6,'Entertainment':5};
function spendingPatterns(){

  try{await sbInit();const r=await sb.from('pocketly_data').select('id').eq('id',CLOUDKEY).maybeSingle();ok('Cloud read',!r.error,r.error?r.error.message:'');
    const w=await sb.from('pocketly_data').upsert({id:CLOUDKEY,data:DB,updated:new Date().toISOString()});ok('Cloud write',!w.error,w.error?w.error.message:'');}catch(e){ok('Cloud connection',false,e.message);}

/* Robust bank/card CSV import + OCR auto-add for images/PDFs */
async function importFiles(files){
  let added=0;const errors=[];
  for(const f of files){
    try{
      if(/\.(csv|txt)$/i.test(f.name)||/text\/csv|text\/plain/.test(f.type)){
        const text=await f.text();const out=parseCSV(text);
        if(out.error)errors.push(`${f.name}: ${out.error}`);else{added+=out.added;recordImport(f.name,out.added);}
      } else if(/image\//.test(f.type)){
        showScan('Reading '+f.name+'…');let text='';
        try{text=await runOCR(f);}catch(e){text='';}
        const r=extractReceipt(text);
        const dataUrl=await fileToDataURL(f);
        DB.transactions.push({id:uid(),date:r.date||dISO(today()),amount:r.amount||0,type:'spend',method:'card',
          category:autoCat(r.merchant||''),scope:SCOPE==='combined'?'personal':SCOPE,
          merchant:r.merchant||'Receipt'+(r.amount?'':' — tap to set amount'),note:r.amount?'Scanned':'Scanned (amount not read)',receipt:dataUrl,source:'import'});
        added++;recordImport(f.name,1);
      } else if(/pdf/i.test(f.type)||/\.pdf$/i.test(f.name)){
        showScan('Reading '+f.name+'…');let text='';
        try{text=await readPDF(f);}catch(e){errors.push(`${f.name}: couldn't read this PDF. Export your statement as CSV instead.`);continue;}
        if(looksLikeStatement(text)){errors.push(`${f.name}: looks like a statement — export it as CSV for accurate import.`);continue;}
        const r=extractReceipt(text);
        if(!r.amount){errors.push(`${f.name}: couldn't read an amount. Try a clearer scan or enter it manually.`);continue;}
        DB.transactions.push({id:uid(),date:r.date||dISO(today()),amount:r.amount,type:'spend',method:'card',
          category:autoCat(r.merchant||''),scope:SCOPE==='combined'?'personal':SCOPE,merchant:r.merchant||'Receipt',note:'Scanned PDF',receipt:null,source:'import'});
        added++;recordImport(f.name,1);
      } else if(/\.xlsx?$/i.test(f.name)||/sheet|excel|spreadsheet/i.test(f.type)){
        showScan('Reading '+f.name+'\u2026');let xtext='';
        try{if(typeof window.XLSX==='undefined')await loadScript(XLSX_CDN);
          const buf=await f.arrayBuffer();const wb=window.XLSX.read(buf,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];xtext=window.XLSX.utils.sheet_to_csv(ws);
        }catch(e){errors.push(`${f.name}: couldn't read this spreadsheet \u2014 export it as CSV instead.`);continue;}
        const out=parseCSV(xtext);if(out.error)errors.push(`${f.name}: ${out.error}`);else{added+=out.added;recordImport(f.name,out.added);}
      } else errors.push(`${f.name}: unsupported file type. Use a CSV statement, Excel file, photo or PDF.`);
    }catch(e){errors.push(`${f.name}: ${e.message||'could not read file'}`);}
  }
  hideScan();
  if(added)save();else updateTag();
  if(errors.length&&!added)showImportError(errors.join('\n'));
  else if(errors.length)toast(`Added ${added}. ${errors.length} skipped.`);
  else toast(added?`Added ${added} ${added===1?'entry':'entries'} (duplicates skipped)`:'No new transactions found');
}
function fileToDataURL(f){return new Promise((res)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>res(null);r.readAsDataURL(f);});}
function showImportError(msg){
  let m=document.getElementById('impErr');
  if(!m){m=document.createElement('div');m.id='impErr';m.className='modal';m.innerHTML=
    `<div class="sheet"><button class="close" onclick="document.getElementById('impErr').classList.remove('show')">×</button>
     <h2>Couldn't import that</h2><div class="banner bad" style="white-space:pre-line" id="impErrMsg"></div>
     <p class="micro" style="margin-top:12px">Pocketly reads bank and card statements exported as CSV (AIB, Bank of Ireland, Revolut, PTSB and similar). Re-export from your bank as CSV and try again.</p>
     <button class="btn" style="margin-top:14px" onclick="document.getElementById('impErr').classList.remove('show')">OK</button></div>`;
    document.body.appendChild(m);}
  document.getElementById('impErrMsg').textContent=msg;m.classList.add('show');}
function csvTokenize(text){const rows=[];let row=[],field='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else q=false;}else field+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(field);field='';}
      else if(c==='\r'){}else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}else field+=c;}}
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.length>1||(r.length===1&&r[0].trim()!==''));}
function normDateImport(s){if(!s)return null;s=String(s).trim();
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  m=s.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if(m){let d=m[1],mo=m[2],y=m[3];if(y.length===2)y='20'+y;return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
  return null;}
function numClean(s){if(s==null)return NaN;return parseFloat(String(s).replace(/[^0-9.\-]/g,''));}
function parseCSV(text){
  text=text.replace(/^\uFEFF/,"");
  const rows=csvTokenize(text);
  if(rows.length<2)return{error:"That file has no readable rows. Upload a bank or card statement saved as CSV."};
  // Headerless AIB / open-banking export: synthesise a header so columns are understood
  if(rows[0]&&/^IE\d{2}[A-Z]{4}/.test(String(rows[0][0]||''))&&/^[A-Z]{3}$/.test(String(rows[0][3]||'').trim())){
    rows.unshift(['Account','Type','Amount','Currency','DC','Date','Description','Balance','BalType','Reference','Counterparty','Entity']);
  }
  const nrm=s=>String(s||'').trim().toLowerCase();
  const header=rows[0].map(nrm);
  const find=(...names)=>{for(const n of names){const i=header.indexOf(n);if(i>=0)return i;}return -1;};
  const findContains=(...subs)=>{for(let i=0;i<header.length;i++){if(subs.some(s=>header[i].includes(s)))return i;}return -1;};
  const iDate=find('completed date','posted transactions date','transaction date','date')>=0
    ?find('completed date','posted transactions date','transaction date','date'):findContains('date');
  const iDebit=find('debit amount','debit'),iCredit=find('credit amount','credit');
  const iOut=find('paid out'),iIn=find('paid in');
  const iAmount=find('amount','local currency amount');
  let iDesc=find('description','description1','narrative','details','merchant');if(iDesc<0)iDesc=findContains('narrative','description','details','merchant','creditor name','reference');
  const iDesc2=find('description2'),iDesc3=find('description3');
  const iState=find('state','status'),iCur=find('posted currency','currency');
  let mode=iDebit>=0||iCredit>=0?'debitcredit':(iOut>=0||iIn>=0?'paidoutin':(iAmount>=0?'signed':null));
  const dateIdx=iDate>=0?iDate:findContains('date','time');
  if(!mode||dateIdx<0)return{error:"That doesn't look like a bank or card statement. I couldn't find date and amount columns."};
  const seen=new Set(DB.transactions.map(t=>t.date+'|'+t.amount+'|'+(t.merchant||'')));
  const tgtScope=SCOPE==='combined'?'personal':SCOPE;let n=0,invalid=0;
  for(let r=1;r<rows.length;r++){const c=rows[r];if(!c.length||c.every(x=>!String(x).trim()))continue;
    if(iState>=0&&c[iState]&&nrm(c[iState])!=='completed'){continue;}
    if(iCur>=0&&c[iCur]&&nrm(c[iCur])!=='eur'){continue;}
    const date=normDateImport(c[dateIdx]);let amount=NaN,type='spend';
    if(mode==='debitcredit'){const d=numClean(c[iDebit]),cr=numClean(c[iCredit]);if(d>0){amount=d;type='spend';}else if(cr>0){amount=cr;type='income';}}
    else if(mode==='paidoutin'){const o=numClean(c[iOut]),inn=numClean(c[iIn]);if(o>0){amount=o;type='spend';}else if(inn>0){amount=inn;type='income';}}
    else{const a=numClean(c[iAmount]);if(!isNaN(a)&&a!==0){amount=Math.abs(a);type=a<0?'spend':'income';}}
    let desc=(c[iDesc]||'').trim();
    if(iDesc2>=0&&c[iDesc2]&&c[iDesc2].trim())desc+=' '+c[iDesc2].trim();
    if(!desc&&iDesc3>=0)desc=(c[iDesc3]||'').trim();
    desc=desc.replace(/\s+/g,' ').trim();
    if(!date||isNaN(amount)||amount<=0){invalid++;continue;}
    const key=date+'|'+amount+'|'+desc;if(seen.has(key))continue;seen.add(key);
    const isTransfer=/\btransfer\b|\bto\s|\bfrom\s/i.test(desc)&&/transfer/i.test(desc);
    DB.transactions.push({id:uid(),date,amount,type,method:'card',category:isTransfer?'Transfers':autoCat(desc),scope:tgtScope,merchant:desc||'Transaction',note:'',receipt:null,source:'import'});n++;}
  if(n===0)return{error:invalid?"I read the file but couldn't make sense of the transactions. Is this the right statement export?":"No new transactions found (they may already be imported)."};
  return{added:n,invalid};}
/* ---------- Scan a document (on-device OCR + PDF text) ---------- */
const TESS_CDN='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
const PDF_CDN='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
const PDF_WORKER='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const HTML2PDF_CDN='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
const XLSX_CDN='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
function loadScript(src){return new Promise((res,rej)=>{if([...document.scripts].some(s=>s.src===src))return res();
  const s=document.createElement('script');s.src=src;s.onload=()=>res();s.onerror=()=>rej(new Error('Could not load reader'));document.head.appendChild(s);});}
function extractReceipt(text){
  const lines=(text||'').split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const amts=[];const re=/(?:€|eur)?\s*(\d{1,4}[.,]\d{2})\b/gi;
  lines.forEach((l,i)=>{let m;const low=l.toLowerCase();
    while((m=re.exec(l))){const v=parseFloat(m[1].replace(',','.'));
      const isTotal=/(^|\b)(total|amount due|balance due|to pay|grand total|total due)\b/.test(low)&&!/sub-?total/.test(low);
      amts.push({v,isTotal});}});
  let amount=null;const tot=amts.filter(a=>a.isTotal);
  if(tot.length)amount=Math.max(...tot.map(a=>a.v));else if(amts.length)amount=Math.max(...amts.map(a=>a.v));
  let date=null,dm=(text||'').match(/(\d{4})-(\d{2})-(\d{2})/);
  if(dm)date=`${dm[1]}-${dm[2]}-${dm[3]}`;
  else{dm=(text||'').match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
    if(dm){let d=dm[1],mo=dm[2],y=dm[3];if(y.length===2)y='20'+y;date=`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}}
  let merchant=null;
  for(const l of lines){const letters=(l.match(/[A-Za-z]/g)||[]).length;
    if(letters>=3&&letters/l.length>0.5&&!/receipt|invoice|vat|tax|total|date|time|tel|www|http/i.test(l)){merchant=l.replace(/[^A-Za-z0-9 &'.-]/g,'').trim();break;}}
  return{amount,date,merchant};}
function looksLikeStatement(text){const pairs=(text||'').match(/\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4}[\s\S]{0,40}?\d+[.,]\d{2}/g)||[];return pairs.length>=4;}
async function runOCR(file){
  if(typeof window.Tesseract==='undefined')await loadScript(TESS_CDN);
  const {data}=await window.Tesseract.recognize(file,'eng',{logger:m=>{if(m.status==='recognizing text')scanMsg('Reading… '+Math.round(m.progress*100)+'%');}});
  return data.text||'';}
async function readPDF(file){
  if(typeof window.pdfjsLib==='undefined'){await loadScript(PDF_CDN);window.pdfjsLib.GlobalWorkerOptions.workerSrc=PDF_WORKER;}
  const buf=await file.arrayBuffer();const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  let text='';for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const c=await p.getTextContent();text+=c.items.map(it=>it.str).join(' ')+'\n';}
  return text;}
function scanMsg(t){let o=document.getElementById('scanOv');if(o)o.querySelector('.sm').textContent=t;}
function showScan(t){let o=document.getElementById('scanOv');if(!o){o=document.createElement('div');o.id='scanOv';
  o.style.cssText='position:fixed;inset:0;z-index:300;background:rgba(27,58,43,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:14px';
  o.innerHTML='<div style="width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite"></div><div class="sm" style="font-weight:600"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
  document.body.appendChild(o);}o.querySelector('.sm').textContent=t;o.style.display='flex';}
function hideScan(){const o=document.getElementById('scanOv');if(o)o.style.display='none';}
function scanReceipt(){closeModal('addModal');const i=document.getElementById('scanInput');i.value='';i.click();}
async function handleScan(file){
  showScan('Reading your document…');
  let text='';
  try{
    if(/pdf/i.test(file.type)||/\.pdf$/i.test(file.name))text=await readPDF(file);
    else text=await runOCR(file);
  }catch(e){hideScan();return openAddPrefilled({},file,"Couldn't read it automatically — pop the amount in.");}
  hideScan();
  if(looksLikeStatement(text)){return showImportError("That looks like a full statement. For statements, export it as CSV from your bank and use Upload — it's far more accurate than scanning. Scanning is best for single receipts.");}
  const r=extractReceipt(text);
  if(!r.amount&&!r.merchant)return openAddPrefilled({},file,"Couldn't read it clearly — enter the details and the photo is saved.");
  openAddPrefilled(r,file,r.amount?null:"Got the receipt — just add the amount.");}
function openAddPrefilled(r,file,note){
  addType='spend';addMethod='card';addScope=SCOPE==='combined'?'personal':SCOPE;
  fillCats();syncSegs();
  document.getElementById('addTitle').textContent='Check & save';
  document.getElementById('aAmount').value=r.amount?r.amount.toFixed(2):'';
  document.getElementById('aMerchant').value=r.merchant||'';
  document.getElementById('aDate').value=r.date||dISO(today());
  document.getElementById('aCategory').value=autoCat(r.merchant||'');
  document.getElementById('aNote').value=note||'';
  const done=(dataUrl)=>{window.__scanReceiptData=dataUrl||null;showModal('addModal');
    if(note)toast(note);else toast('Scanned — check the amount and save');};
  if(file&&/image/.test(file.type)){const rd=new FileReader();rd.onload=()=>done(rd.result);rd.onerror=()=>done(null);rd.readAsDataURL(file);}else done(null);}
function exportCSV(){const rows=[['date','merchant','category','type','method','scope','amount']];
  DB.transactions.forEach(t=>rows.push([t.date,t.merchant||'',t.category,t.type,t.method,t.scope,(t.type==='spend'?-t.amount:t.amount)]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='pocketly-export.csv';a.click();}
function deleteTxn(id){if(confirm('Delete this entry?')){DB.transactions=DB.transactions.filter(t=>t.id!==id);save();toast('Entry deleted');}}
function clearAll(){if(confirm('Delete everything? This cannot be undone.')){DB=defaults();save();toast('All data cleared');}}
/* ---------- UI plumbing ---------- */
function showModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function syncSegs(){
  setSeg('typeSeg','data-type',addType);setSeg('methodSeg','data-method',addMethod);setSeg('addScopeSeg','data-ascope',addScope);
  setSeg('goalScopeSeg','data-gscope',goalScope);setSeg('billScopeSeg','data-bscope',billScope);
}
function setSeg(id,attr,val){const el=document.getElementById(id);if(!el)return;el.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.getAttribute(attr)===val));}
function toast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#1A1A17;color:#fff;padding:11px 16px;border-radius:999px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.3)';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity='0',1800);}
let navHist=['home'],navPos=0;
function setView(v,fromHist){VIEW=v;['home','report','plan'].forEach(x=>document.getElementById('view-'+x).classList.toggle('hide',x!==v));
  document.querySelectorAll('nav.tab button[data-view]').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  if(v==='report')renderReport();if(v==='plan')renderPlan();window.scrollTo(0,0);
  if(!fromHist&&navHist[navPos]!==v){navHist=navHist.slice(0,navPos+1);navHist.push(v);navPos=navHist.length-1;}
  updateHistButtons();}
function histBack(){if(navPos>0){navPos--;setView(navHist[navPos],true);}}
function histFwd(){if(navPos<navHist.length-1){navPos++;setView(navHist[navPos],true);}}
function updateHistButtons(){const b=document.getElementById('navBack'),f=document.getElementById('navFwd');if(b)b.disabled=navPos<=0;if(f)f.disabled=navPos>=navHist.length-1;}
function renderAll(){updateTag();renderHome();if(VIEW==='report')renderReport();if(VIEW==='plan')renderPlan();}
function updateTag(){const t=document.getElementById('updatedTag');if(!DB.meta.lastUpdated){t.textContent='No data yet';t.className='updated';return;}
  const stale=daysBetween(DB.meta.lastUpdated,today())>=7;t.textContent='Updated '+ago(DB.meta.lastUpdated);t.className='updated'+(stale?' stale':'');}
/* events */
document.getElementById('scopeSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;SCOPE=b.dataset.scope;setSeg('scopeSeg','data-scope',SCOPE);renderAll();});
document.querySelectorAll('nav.tab button[data-view]').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));
document.getElementById('navBack').addEventListener('click',histBack);
document.getElementById('navFwd').addEventListener('click',histFwd);
document.getElementById('navUpload').addEventListener('click',()=>document.getElementById('fileImport').click());
document.getElementById('fabAdd').addEventListener('click',openAdd);
document.getElementById('typeSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(b){addType=b.dataset.type;setSeg('typeSeg','data-type',addType);document.getElementById('addTitle').textContent=addType==='income'?'Add money in':'Add money out';}});
document.getElementById('methodSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(b){addMethod=b.dataset.method;setSeg('methodSeg','data-method',addMethod);}});
document.getElementById('addScopeSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(b){addScope=b.dataset.ascope;setSeg('addScopeSeg','data-ascope',addScope);}});
document.getElementById('goalScopeSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(b){goalScope=b.dataset.gscope;setSeg('goalScopeSeg','data-gscope',goalScope);}});
document.getElementById('billScopeSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(b){billScope=b.dataset.bscope;setSeg('billScopeSeg','data-bscope',billScope);}});
document.getElementById('fileImport').addEventListener('change',e=>{if(e.target.files.length)importFiles(e.target.files);e.target.value='';});
document.getElementById('scanInput').addEventListener('change',e=>{if(e.target.files[0])handleScan(e.target.files[0]);e.target.value='';});
window.addEventListener('error',function(e){logError(e.message,(e.filename||'')+':'+(e.lineno||''));});window.addEventListener('unhandledrejection',function(e){logError('Promise: '+((e.reason&&e.reason.message)||e.reason),'');});
renderAll();updateHistButtons();
loadVersions();lockCheck();cloudBoot();
</script>
